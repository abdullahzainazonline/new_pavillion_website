<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavilion Square – Luxury Residences</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      pointer-events: none;
    }

    h1 {
      color: #c9a96e;
      font-family: Georgia, serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    p {
      color: rgba(255,255,255,0.55);
      font-family: Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

  <video
    id="vid"
    src="https://kaoljqciecsnafblzmci.supabase.co/storage/v1/object/public/video/Pavilion_Square_Luxury_Residences_Urban_Luxe_720P.mp4"
    autoplay
    muted
    loop
    playsinline
  ></video>

  <div class="overlay">
    <h1>Pavilion Square</h1>
    <p>Luxury Residences</p>
  </div>

  <script>
    const vid = document.getElementById('vid');

    vid.addEventListener('canplay', () => {
      const req =
        vid.requestFullscreen ||
        vid.webkitRequestFullscreen ||
        vid.mozRequestFullScreen ||
        vid.msRequestFullscreen;
      if (req) req.call(vid);
    }, { once: true });
  </script>

</body>
</html>
